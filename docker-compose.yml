version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: sprut-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sprut}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sprut_secret}
      POSTGRES_DB: ${POSTGRES_DB:-sprut_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sprut} -d ${POSTGRES_DB:-sprut_db}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  sprut-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sprut-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./config.yaml:/app/config.yaml:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  n8n:
    image: n8nio/n8n
    container_name: sprut-n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD:-admin}
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=${POSTGRES_DB:-sprut_db}
      - DB_POSTGRESDB_USER=${POSTGRES_USER:-sprut}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD:-sprut_secret}
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4
    container_name: sprut-pgadmin
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@sprut.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    profiles:
      - tools
    restart: unless-stopped

volumes:
  postgres_data:
  n8n_data:
